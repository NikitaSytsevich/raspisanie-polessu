<!DOCTYPE html>
<html class="light" lang="ru"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Polessu Schedule - Settings Screen</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;500;600;700;800;900&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#276bf1",
                        "background-light": "#ffffff",
                        "header-tint": "#f8fafc",
                    },
                    fontFamily: {
                        "display": ["Lexend", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.25rem",
                        "lg": "0.5rem",
                        "xl": "0.75rem",
                        "2xl": "1rem",
                        "3xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style type="text/tailwindcss">
        body {
            font-family: 'Lexend', sans-serif;
            -webkit-tap-highlight-color: transparent;
            background-color: #ffffff;
            color: #000000;
        }
        .ios-blur {
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
        }
        .toggle-checkbox:checked {
            right: 0;
            border-color: #276bf1;
        }
        .toggle-checkbox:checked + .toggle-label {
            background-color: #276bf1;
        }
        .header-depth {
            border-bottom: 1px solid rgba(0, 0, 0, 0.05);
        }
    </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
  </head>
<body class="bg-background-light min-h-screen flex flex-col">
<header class="sticky top-0 z-50 bg-header-tint/95 ios-blur px-6 pt-12 pb-4 header-depth">
<div class="flex flex-col gap-4">
<div class="flex items-center">
<button class="relative size-10 -ml-2 flex items-center justify-center rounded-xl hover:bg-black/5 text-slate-900 active:scale-95 transition-all">
<span class="material-symbols-outlined text-[28px] font-medium">arrow_back</span>
</button>
</div>
<h1 class="text-[34px] font-[900] tracking-tight text-black leading-tight">Настройки</h1>
</div>
</header>
<main class="flex-1 px-6 py-8">
<section class="mb-12">
<h2 class="text-xs font-[800] text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Уведомления</h2>
<div class="bg-slate-50 rounded-[32px] overflow-hidden border border-slate-100/80 shadow-sm">
<div class="p-6 flex items-center justify-between">
<div class="flex items-center gap-5">
<div class="size-12 rounded-2xl bg-gradient-to-br from-primary to-blue-600 flex items-center justify-center text-white shadow-lg shadow-blue-500/20">
<span class="material-symbols-outlined text-[26px]" style="font-variation-settings: 'FILL' 1;">notifications_active</span>
</div>
<div class="flex flex-col gap-0.5">
<h3 class="font-[800] text-slate-900 text-[17px]">Push-уведомления</h3>
<p class="text-xs text-slate-500 font-bold">Изменения и новости</p>
</div>
</div>
<div class="relative inline-block w-[52px] h-[32px] align-middle select-none transition duration-200 ease-in">
<input class="toggle-checkbox absolute block w-7 h-7 rounded-full bg-white border-4 appearance-none cursor-pointer border-slate-200 checked:right-0.5 checked:border-white transition-all duration-300 z-10 top-0.5 shadow-sm" id="toggle" name="toggle" type="checkbox"/>
<label class="toggle-label block overflow-hidden h-8 rounded-full bg-slate-200 cursor-pointer transition-colors duration-300" for="toggle"></label>
</div>
</div>
</div>
</section>
<section>
<h2 class="text-xs font-[800] text-slate-400 uppercase tracking-[0.2em] mb-4 ml-1">Тема оформления</h2>
<div class="grid grid-cols-2 gap-4">
<button class="group relative flex flex-col items-center overflow-hidden rounded-[24px] border-2 border-primary bg-slate-50 p-4 transition-all hover:scale-[1.02] active:scale-95 shadow-md shadow-primary/10">
<div class="absolute top-3 right-3 size-6 rounded-full bg-primary flex items-center justify-center z-10 shadow-sm">
<span class="material-symbols-outlined text-white text-[16px] font-[800]">check</span>
</div>
<div class="mb-4 flex h-32 w-full flex-col gap-2 rounded-xl bg-white p-3 shadow-sm border border-slate-100">
<div class="h-3 w-1/3 rounded-full bg-slate-100"></div>
<div class="flex gap-2">
<div class="h-16 w-full rounded-lg bg-slate-50 border border-slate-100"></div>
</div>
<div class="mt-auto flex gap-2">
<div class="h-2 w-full rounded-full bg-slate-100"></div>
<div class="h-2 w-1/4 rounded-full bg-blue-100"></div>
</div>
</div>
<span class="text-[15px] font-[800] text-primary">Светлая</span>
</button>
<button class="group relative flex flex-col items-center overflow-hidden rounded-[24px] border-2 border-transparent bg-slate-900 p-4 transition-all hover:scale-[1.02] active:scale-95 shadow-lg">
<div class="mb-4 flex h-32 w-full flex-col gap-2 rounded-xl bg-slate-800 p-3 shadow-inner border border-slate-700">
<div class="h-3 w-1/3 rounded-full bg-slate-700"></div>
<div class="flex gap-2">
<div class="h-16 w-full rounded-lg bg-slate-900/50 border border-slate-700/50"></div>
</div>
<div class="mt-auto flex gap-2">
<div class="h-2 w-full rounded-full bg-slate-700"></div>
<div class="h-2 w-1/4 rounded-full bg-slate-600"></div>
</div>
</div>
<span class="text-[15px] font-[800] text-white">Темная</span>
</button>
<button class="col-span-2 group relative flex items-center gap-6 overflow-hidden rounded-[24px] border-2 border-transparent bg-slate-100 p-4 transition-all hover:scale-[1.01] active:scale-95">
<div class="relative flex h-24 w-1/2 overflow-hidden rounded-xl border border-slate-200 shadow-sm">
<div class="absolute inset-0 flex">
<div class="w-1/2 h-full bg-white flex flex-col justify-center p-3 gap-2">
<div class="w-full h-2 bg-slate-100 rounded"></div>
<div class="w-2/3 h-2 bg-slate-100 rounded"></div>
</div>
<div class="w-1/2 h-full bg-slate-900 flex flex-col justify-center p-3 gap-2">
<div class="w-full h-2 bg-slate-700 rounded"></div>
<div class="w-2/3 h-2 bg-slate-700 rounded"></div>
</div>
</div>
<div class="absolute inset-0 flex items-center justify-center">
<div class="size-8 rounded-full bg-white/20 backdrop-blur-md border border-white/40 flex items-center justify-center shadow-lg">
<span class="material-symbols-outlined text-slate-800 text-[18px]">settings_brightness</span>
</div>
</div>
</div>
<div class="flex flex-col items-start">
<span class="text-[17px] font-[800] text-slate-900">Системная</span>
<span class="text-xs font-semibold text-slate-400 mt-1">Автоматически</span>
</div>
</button>
</div>
</section>
</main>

</body></html>
